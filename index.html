<!doctype html>
<html lang="en" data-theme="toolbox">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Primary Meta Tags -->
    <title>WebToolkit — All-in-One Developer Utilities</title>
    <meta name="title" content="WebToolkit — All-in-One Developer Utilities" />
    <meta name="description" content="A comprehensive collection of free, fast, and privacy-first developer utilities — all running entirely client-side." />
    <meta name="keywords" content="developer tools, web utilities, online tools, developer utilities" />
    <meta name="author" content="Poorana Selvan" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2D79FF" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WebToolkit — All-in-One Developer Utilities" />
    <meta property="og:description" content="Free, fast, and privacy-first developer utilities — all running entirely client-side." />
    <meta property="og:image" content="/logo.svg" />
    <meta property="og:site_name" content="WebToolkit" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WebToolkit — All-in-One Developer Utilities" />
    <meta name="twitter:description" content="Free, fast, and privacy-first developer utilities — all running entirely client-side." />
    <meta name="twitter:image" content="/logo.svg" />

    <!-- Fonts - Optimized loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/favicon.svg" />
    
    <!-- Performance optimizations -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  </head>
  <body class="font-sans antialiased">
    <!-- Noscript fallback -->
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; font-family: system-ui, -apple-system, sans-serif;">
        <div>
          <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem;">JavaScript Required</h1>
          <p style="opacity: 0.7;">WebToolkit requires JavaScript to function. Please enable JavaScript in your browser settings.</p>
        </div>
      </div>
    </noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
